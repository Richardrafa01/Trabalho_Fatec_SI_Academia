<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/Trabalho_Fatec_SI_Academia/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Academia Pro - Login</title>
    <script type="module" crossorigin src="/Trabalho_Fatec_SI_Academia/assets/index-gSCmQuRz.js"></script>
    <link rel="modulepreload" crossorigin href="/Trabalho_Fatec_SI_Academia/assets/routes-Bgo3Lf6M.js">
    <link rel="modulepreload" crossorigin href="/Trabalho_Fatec_SI_Academia/assets/supabase-DRIufT6S.js">
    <link rel="stylesheet" crossorigin href="/Trabalho_Fatec_SI_Academia/assets/routes-DYyKSHWH.css">
  </head>
  <body
    class="min-h-screen bg-[linear-gradient(rgba(10,18,24,0.62),rgba(10,18,24,0.62)),url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=1600&q=80')] bg-cover bg-center font-sans text-slate-900"
  >
    <main class="flex min-h-screen items-center justify-center px-4 py-8">
      <section
        class="w-full max-w-[420px] rounded-lg bg-white p-7 shadow-[0_24px_70px_rgba(0,0,0,0.28)] sm:p-9"
        aria-label="Login do sistema da academia"
      >
        <div class="mb-7">
          <span class="mb-2.5 inline-block text-xs font-bold uppercase tracking-wider text-orange-600">
            Academia Pro
          </span>
          <h1 class="text-2xl font-bold leading-tight text-slate-950 sm:text-3xl">
            Acesse o sistema da academia
          </h1>
          <p class="mt-2.5 text-sm leading-6 text-slate-600 sm:text-[15px]">
            Gerencie alunos, planos, pagamentos e treinos em um so lugar.
          </p>
        </div>

        <form id="login-form">
          <div class="mb-4">
            <label class="mb-2 block text-sm font-bold text-slate-700" for="email">
              E-mail
            </label>
            <input
              class="h-12 w-full rounded-md border border-slate-300 px-3.5 text-[15px] text-slate-900 outline-none transition focus:border-orange-600 focus:ring-4 focus:ring-orange-600/15"
              id="email"
              name="email"
              type="email"
              placeholder="admin@academia.com"
              autocomplete="email"
              required
            />
          </div>

          <div class="mb-4">
            <label class="mb-2 block text-sm font-bold text-slate-700" for="password">
              Senha
            </label>
            <input
              class="h-12 w-full rounded-md border border-slate-300 px-3.5 text-[15px] text-slate-900 outline-none transition focus:border-orange-600 focus:ring-4 focus:ring-orange-600/15"
              id="password"
              name="password"
              type="password"
              placeholder="Digite sua senha"
              autocomplete="current-password"
              required
            />
          </div>

          <div class="mb-5 mt-1.5 flex flex-col items-start justify-between gap-3 text-sm sm:flex-row sm:items-center">
            <label class="flex items-center gap-2 text-slate-600" for="remember">
              <input
                class="h-4 w-4 rounded border-slate-300 text-orange-600 focus:ring-orange-600"
                id="remember"
                name="remember"
                type="checkbox"
              />
              Lembrar acesso
            </label>
            <a class="font-bold text-orange-700 hover:underline" href="#">
              Esqueci minha senha
            </a>
          </div>

          <button
            id="login-button"
            class="h-[50px] w-full rounded-md bg-orange-600 text-base font-bold text-white transition hover:-translate-y-0.5 hover:bg-orange-700 focus:outline-none focus:ring-4 focus:ring-orange-600/25"
            type="submit"
          >
            Entrar
          </button>

          <p id="login-message" class="mt-4 hidden text-center text-sm font-semibold"></p>
        </form>

        <p class="mt-5 text-center text-sm text-slate-600">
          Ainda nao tem cadastro?
          <a class="font-bold text-orange-700 hover:underline" href="#">Criar conta</a>
        </p>
      </section>
    </main>
  </body>
</html>
