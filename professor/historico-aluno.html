<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Historico do Aluno - Academia Pro</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="min-h-screen bg-slate-100 font-sans text-slate-900" data-area="professor" data-page="historico-aluno">
    <main class="mx-auto max-w-4xl px-4 py-8">
      <a class="text-sm font-bold text-orange-700 hover:underline" href="/professor/menu.html#alunos">Voltar ao Menu Professor</a>
      <section class="mt-5 rounded-lg bg-white p-6 shadow-sm">
        <h1 class="text-2xl font-bold text-slate-950">Historico do aluno</h1>
        <p class="mt-1 text-sm text-slate-600">Consulte movimentacoes registradas no cadastro.</p>
        <p id="message" class="mt-5 hidden"></p>
        <p id="empty-state" class="mt-5 hidden rounded-md border border-dashed border-slate-300 p-4 text-center text-sm text-slate-500">Nenhum aluno cadastrado.</p>
        <div class="mt-6">
          <label class="mb-2 block text-sm font-bold text-slate-700" for="aluno-id">Aluno</label>
          <input id="aluno-id" type="hidden" />
          <input class="h-12 w-full rounded-md border border-slate-300 px-3 outline-none focus:border-orange-600 focus:ring-4 focus:ring-orange-600/15" id="aluno-search" autocomplete="off" placeholder="Digite as letras iniciais do aluno" />
          <div id="aluno-results" class="mt-2 hidden overflow-hidden rounded-md border border-slate-200 bg-white"></div>
        </div>
        <pre id="history-box" class="mt-5 min-h-40 whitespace-pre-wrap rounded-md bg-slate-100 p-4 text-sm text-slate-700">Selecione um aluno para ver o historico.</pre>
      </section>
    </main>
    <script type="module" src="/src/professor-theme.js"></script>
    <script type="module" src="/src/alunos.js"></script>
  </body>
</html>
