<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bloquear Aluno - Academia Pro</title>
    <script type="module" crossorigin src="/Trabalho_Fatec_SI_Academia/assets/routes-DJYPUaRo.js"></script>
    <script type="module" crossorigin src="/Trabalho_Fatec_SI_Academia/assets/admin-theme-BUUdBfJm.js"></script>
    <script type="module" crossorigin src="/Trabalho_Fatec_SI_Academia/assets/supabase-DRIufT6S.js"></script>
    <script type="module" crossorigin src="/Trabalho_Fatec_SI_Academia/assets/planos-DYzH_05V.js"></script>
    <script type="module" crossorigin src="/Trabalho_Fatec_SI_Academia/assets/alunos-DrDitvQa.js"></script>
    <link rel="stylesheet" crossorigin href="/Trabalho_Fatec_SI_Academia/assets/routes-BT_qTyH9.css">
  </head>
  <body class="min-h-screen bg-slate-100 font-sans text-slate-900" data-page="bloquear-aluno">
    <main class="mx-auto max-w-4xl px-4 py-8">
      <a class="text-sm font-bold text-orange-700 hover:underline" href="../admin/controle-acesso.html">Voltar ao controle de acesso</a>
      <section class="mt-5 rounded-lg bg-white p-6 shadow-sm">
        <h1 class="text-2xl font-bold text-slate-950">Bloquear ou liberar aluno</h1>
        <p class="mt-1 text-sm text-slate-600">Bloqueie ou libere o acesso do aluno.</p>
        <p id="message" class="mt-5 hidden"></p>
        <p id="empty-state" class="mt-5 hidden rounded-md border border-dashed border-slate-300 p-4 text-center text-sm text-slate-500">Nenhum aluno cadastrado.</p>

        <form id="aluno-form" class="mt-6 grid gap-4">
          <div>
            <label class="mb-2 block text-sm font-bold text-slate-700" for="aluno-id">Aluno</label>
            <input id="aluno-id" type="hidden" />
            <input class="h-12 w-full rounded-md border border-slate-300 px-3 outline-none focus:border-orange-600 focus:ring-4 focus:ring-orange-600/15" id="aluno-search" autocomplete="off" placeholder="Buscar por nome" />
            <div id="aluno-results" class="mt-2 hidden overflow-hidden rounded-md border border-slate-200 bg-white"></div>
            <div id="aluno-selected" class="mt-4 hidden rounded-md bg-slate-100 p-4 text-sm text-slate-700"></div>
          </div>
          <div>
            <label class="mb-2 block text-sm font-bold text-slate-700" for="motivo_bloqueio">Motivo do bloqueio</label>
            <textarea class="min-h-24 w-full rounded-md border border-slate-300 p-3 outline-none focus:border-orange-600 focus:ring-4 focus:ring-orange-600/15" id="motivo_bloqueio" name="motivo_bloqueio" placeholder="Ex: pagamento pendente"></textarea>
          </div>
          <div class="grid gap-3 sm:grid-cols-2">
            <button class="h-12 rounded-md bg-red-600 px-4 text-sm font-bold text-white hover:bg-red-700" id="bloquear-aluno-button" type="button" disabled>Bloquear aluno</button>
            <button class="h-12 rounded-md bg-emerald-600 px-4 text-sm font-bold text-white hover:bg-emerald-700" id="liberar-aluno-button" type="button" disabled>Liberar aluno</button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
