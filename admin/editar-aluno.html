<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Aluno - Academia Pro</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="min-h-screen bg-slate-100 font-sans text-slate-900" data-page="editar-aluno">
    <main class="mx-auto max-w-5xl px-4 py-8">
      <a class="text-sm font-bold text-orange-700 hover:underline" href="/admin/menu.html#alunos">Voltar ao painel</a>
      <section class="mt-5 rounded-lg bg-white p-6 shadow-sm">
        <h1 class="text-2xl font-bold text-slate-950">Editar aluno</h1>
        <p class="mt-1 text-sm text-slate-600">Atualize o cadastro do aluno.</p>
        <p id="message" class="mt-5 hidden"></p>
        <p id="empty-state" class="mt-5 hidden rounded-md border border-dashed border-slate-300 p-4 text-center text-sm text-slate-500">Nenhum aluno cadastrado.</p>

        <form id="aluno-form" class="mt-6 grid gap-4 sm:grid-cols-2">
          <div class="sm:col-span-2">
            <label class="mb-2 block text-sm font-bold text-slate-700" for="aluno-id">Aluno</label>
            <input id="aluno-id" type="hidden" />
            <input class="h-12 w-full rounded-md border border-slate-300 px-3 outline-none focus:border-orange-600 focus:ring-4 focus:ring-orange-600/15" id="aluno-search" autocomplete="off" placeholder="Buscar por nome" />
            <div id="aluno-results" class="mt-2 hidden overflow-hidden rounded-md border border-slate-200 bg-white"></div>
          </div>
          <div>
            <label class="mb-2 block text-sm font-bold text-slate-700" for="nome_completo">Nome completo</label>
            <input class="h-12 w-full rounded-md border border-slate-300 px-3 outline-none focus:border-orange-600 focus:ring-4 focus:ring-orange-600/15" id="nome_completo" name="nome_completo" required />
          </div>
          <div>
            <label class="mb-2 block text-sm font-bold text-slate-700" for="email">E-mail</label>
            <input class="h-12 w-full rounded-md border border-slate-300 px-3 outline-none focus:border-orange-600 focus:ring-4 focus:ring-orange-600/15" id="email" name="email" type="email" required />
          </div>
          <div>
            <label class="mb-2 block text-sm font-bold text-slate-700" for="telefone">Telefone</label>
            <input class="h-12 w-full rounded-md border border-slate-300 px-3 outline-none focus:border-orange-600 focus:ring-4 focus:ring-orange-600/15" id="telefone" name="telefone" />
          </div>
          <div>
            <label class="mb-2 block text-sm font-bold text-slate-700" for="cpf">CPF</label>
            <input class="h-12 w-full rounded-md border border-slate-300 px-3 outline-none focus:border-orange-600 focus:ring-4 focus:ring-orange-600/15" id="cpf" name="cpf" required />
          </div>
          <div>
            <label class="mb-2 block text-sm font-bold text-slate-700" for="data_nascimento">Data de nascimento</label>
            <input class="h-12 w-full rounded-md border border-slate-300 px-3 outline-none focus:border-orange-600 focus:ring-4 focus:ring-orange-600/15" id="data_nascimento" name="data_nascimento" type="date" />
          </div>
          <div>
            <label class="mb-2 block text-sm font-bold text-slate-700" for="status">Status</label>
            <select class="h-12 w-full rounded-md border border-slate-300 px-3 outline-none focus:border-orange-600 focus:ring-4 focus:ring-orange-600/15" id="status" name="status">
              <option value="ATIVO">Ativo</option>
              <option value="INATIVO">Inativo</option>
            </select>
          </div>
          <div>
            <label class="mb-2 block text-sm font-bold text-slate-700" for="plano">Plano</label>
            <input class="h-12 w-full rounded-md border border-slate-300 px-3 outline-none focus:border-orange-600 focus:ring-4 focus:ring-orange-600/15" id="plano" name="plano" />
          </div>
          <div>
            <label class="mb-2 block text-sm font-bold text-slate-700" for="validade_matricula">Validade da matricula</label>
            <input class="h-12 w-full rounded-md border border-slate-300 px-3 outline-none focus:border-orange-600 focus:ring-4 focus:ring-orange-600/15" id="validade_matricula" name="validade_matricula" type="date" />
          </div>
          <div>
            <label class="mb-2 block text-sm font-bold text-slate-700" for="cep">CEP</label>
            <input class="h-12 w-full rounded-md border border-slate-300 px-3 outline-none focus:border-orange-600 focus:ring-4 focus:ring-orange-600/15" id="cep" name="cep" inputmode="numeric" maxlength="9" placeholder="Ex: 01001-000" />
          </div>
          <div>
            <label class="mb-2 block text-sm font-bold text-slate-700" for="endereco">Endereco</label>
            <input class="h-12 w-full rounded-md border border-slate-300 px-3 outline-none focus:border-orange-600 focus:ring-4 focus:ring-orange-600/15" id="endereco" name="endereco" />
          </div>
          <div>
            <label class="mb-2 block text-sm font-bold text-slate-700" for="numero">Numero</label>
            <input class="h-12 w-full rounded-md border border-slate-300 px-3 outline-none focus:border-orange-600 focus:ring-4 focus:ring-orange-600/15" id="numero" name="numero" />
          </div>
          <div>
            <label class="mb-2 block text-sm font-bold text-slate-700" for="bairro">Bairro</label>
            <input class="h-12 w-full rounded-md border border-slate-300 px-3 outline-none focus:border-orange-600 focus:ring-4 focus:ring-orange-600/15" id="bairro" name="bairro" />
          </div>
          <div>
            <label class="mb-2 block text-sm font-bold text-slate-700" for="cidade">Cidade</label>
            <input class="h-12 w-full rounded-md border border-slate-300 px-3 outline-none focus:border-orange-600 focus:ring-4 focus:ring-orange-600/15" id="cidade" name="cidade" />
          </div>
          <div>
            <label class="mb-2 block text-sm font-bold text-slate-700" for="estado">Estado</label>
            <input class="h-12 w-full rounded-md border border-slate-300 px-3 outline-none focus:border-orange-600 focus:ring-4 focus:ring-orange-600/15" id="estado" name="estado" maxlength="2" />
          </div>
          <div class="sm:col-span-2">
            <label class="mb-2 block text-sm font-bold text-slate-700" for="complemento">Complemento</label>
            <input class="h-12 w-full rounded-md border border-slate-300 px-3 outline-none focus:border-orange-600 focus:ring-4 focus:ring-orange-600/15" id="complemento" name="complemento" />
          </div>
          <div class="sm:col-span-2">
            <label class="mb-2 block text-sm font-bold text-slate-700" for="observacoes">Observacoes</label>
            <textarea class="min-h-28 w-full rounded-md border border-slate-300 p-3 outline-none focus:border-orange-600 focus:ring-4 focus:ring-orange-600/15" id="observacoes" name="observacoes"></textarea>
          </div>
          <button class="h-12 rounded-md bg-orange-600 px-4 text-sm font-bold text-white hover:bg-orange-700 sm:col-span-2" type="submit">
            Salvar alteracoes
          </button>
        </form>
      </section>
    </main>
    <script type="module" src="/src/admin-theme.js"></script>
    <script type="module" src="/src/alunos.js"></script>
  </body>
</html>
