<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excluir Aluno - Academia Pro</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="min-h-screen bg-slate-100 font-sans text-slate-900" data-page="excluir-aluno">
    <main class="mx-auto max-w-5xl px-4 py-8">
      <a class="text-sm font-bold text-orange-700 hover:underline" href="/admin/menu.html#alunos">Voltar ao Menu Admin</a>
      <section class="mt-5 rounded-lg bg-white p-6 shadow-sm">
        <h1 class="text-2xl font-bold text-slate-950">Excluir aluno</h1>
        <p class="mt-1 text-sm text-slate-600">Exclua registros salvos na tabela alunos.</p>
        <p id="message" class="mt-5 hidden"></p>
        <div class="mt-6 overflow-x-auto">
          <table class="w-full min-w-[720px] text-left text-sm">
            <thead class="bg-slate-100 text-slate-600">
              <tr>
                <th class="px-4 py-3">Nome</th>
                <th class="px-4 py-3">E-mail</th>
                <th class="px-4 py-3">Telefone</th>
                <th class="px-4 py-3">Status</th>
                <th class="px-4 py-3">Acao</th>
              </tr>
            </thead>
            <tbody id="alunos-list" class="divide-y divide-slate-100"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script type="module" src="/src/alunos.js"></script>
  </body>
</html>
