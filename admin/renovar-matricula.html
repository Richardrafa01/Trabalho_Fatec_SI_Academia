<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Renovar Matricula - Academia Pro</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="min-h-screen bg-slate-100 font-sans text-slate-900" data-page="renovar-matricula">
    <main class="mx-auto max-w-4xl px-4 py-8">
      <a class="text-sm font-bold text-orange-700 hover:underline" href="/admin/menu.html#alunos">Voltar ao painel</a>
      <section class="mt-5 rounded-lg bg-white p-6 shadow-sm">
        <h1 class="text-2xl font-bold text-slate-950">Renovar matricula</h1>
        <p class="mt-1 text-sm text-slate-600">Registre o pagamento e renove a matricula.</p>
        <p id="message" class="mt-5 hidden"></p>
        <p id="empty-state" class="mt-5 hidden rounded-md border border-dashed border-slate-300 p-4 text-center text-sm text-slate-500">Nenhum aluno cadastrado.</p>
        <form id="aluno-form" class="mt-6 grid gap-4">
          <div>
            <label class="mb-2 block text-sm font-bold text-slate-700" for="aluno-id">Aluno</label>
            <input id="aluno-id" type="hidden" />
            <input class="h-12 w-full rounded-md border border-slate-300 px-3 outline-none focus:border-orange-600 focus:ring-4 focus:ring-orange-600/15" id="aluno-search" autocomplete="off" placeholder="Buscar por nome" />
            <div id="aluno-results" class="mt-2 hidden overflow-hidden rounded-md border border-slate-200 bg-white"></div>
            <div id="aluno-selected" class="mt-4 hidden rounded-md bg-slate-100 p-4 text-sm text-slate-700"></div>
          </div>
          <div>
            <label class="mb-2 block text-sm font-bold text-slate-700" for="plano">Plano renovado</label>
            <select class="h-12 w-full rounded-md border border-slate-300 px-3 outline-none focus:border-orange-600 focus:ring-4 focus:ring-orange-600/15" id="plano" name="plano" required>
              <option value="">Carregando planos</option>
            </select>
          </div>
          <div>
            <label class="mb-2 block text-sm font-bold text-slate-700" for="forma_pagamento">Forma de pagamento</label>
            <select class="h-12 w-full rounded-md border border-slate-300 px-3 outline-none focus:border-orange-600 focus:ring-4 focus:ring-orange-600/15" id="forma_pagamento" name="forma_pagamento" required>
              <option value="">Selecione a forma</option>
              <option value="DINHEIRO">Dinheiro</option>
              <option value="PIX">PIX</option>
              <option value="CARTAO_CREDITO">Cartao de credito</option>
              <option value="CARTAO_DEBITO">Cartao de debito</option>
            </select>
          </div>
          <div class="rounded-md bg-slate-100 p-4">
            <p class="text-sm font-bold text-slate-700">Resumo da renovacao</p>
            <p id="validade-preview" class="mt-2 text-sm font-semibold text-slate-600">Selecione um plano para calcular valor e validade.</p>
          </div>
          <label class="flex items-start gap-3 rounded-md border border-slate-200 p-4 text-sm font-semibold text-slate-700">
            <input class="mt-1 h-4 w-4 accent-orange-600" id="pagamento_confirmado" name="pagamento_confirmado" type="checkbox" />
            <span>Pagamento recebido. Reativar acesso da catraca para este aluno.</span>
          </label>
          <div>
            <label class="mb-2 block text-sm font-bold text-slate-700" for="observacoes_pagamento">Observacoes do pagamento</label>
            <textarea class="min-h-24 w-full rounded-md border border-slate-300 p-3 outline-none focus:border-orange-600 focus:ring-4 focus:ring-orange-600/15" id="observacoes_pagamento" name="observacoes_pagamento"></textarea>
          </div>
          <button class="h-12 rounded-md bg-orange-600 px-4 text-sm font-bold text-white hover:bg-orange-700" type="submit">Renovar matricula</button>
        </form>
      </section>
    </main>
    <script type="module" src="/src/admin-theme.js"></script>
    <script type="module" src="/src/alunos.js"></script>
  </body>
</html>
