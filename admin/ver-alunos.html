<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alunos Cadastrados - Academia Pro</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="min-h-screen bg-slate-100 font-sans text-slate-900" data-page="ver-alunos">
    <main class="mx-auto max-w-5xl px-4 py-8">
      <a class="text-sm font-bold text-orange-700 hover:underline" href="/admin/menu.html#alunos">Voltar ao Menu Admin</a>
      <section class="mt-5 rounded-lg bg-white p-6 shadow-sm">
        <h1 class="text-2xl font-bold text-slate-950">Alunos cadastrados</h1>
        <p class="mt-1 text-sm text-slate-600">Digite as letras iniciais para encontrar alunos rapidamente.</p>
        <p id="message" class="mt-5 hidden"></p>
        <p id="empty-state" class="mt-5 hidden rounded-md border border-dashed border-slate-300 p-4 text-center text-sm text-slate-500">Nenhum aluno cadastrado.</p>

        <div class="mt-6">
          <label class="mb-2 block text-sm font-bold text-slate-700" for="aluno-search">Buscar aluno</label>
          <input class="h-12 w-full rounded-md border border-slate-300 px-3 outline-none focus:border-orange-600 focus:ring-4 focus:ring-orange-600/15" id="aluno-search" autocomplete="off" placeholder="Digite as letras iniciais do aluno" />
          <div id="alunos-cards" class="mt-5 grid gap-3 sm:grid-cols-2"></div>
        </div>
      </section>
    </main>
    <script type="module" src="/src/alunos.js"></script>
  </body>
</html>
