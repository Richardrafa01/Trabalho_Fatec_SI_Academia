<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excluir Professor - Academia Pro</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="min-h-screen bg-slate-100 font-sans text-slate-900" data-page="excluir-professor">
    <main class="mx-auto max-w-5xl px-4 py-8">
      <a class="text-sm font-bold text-orange-700 hover:underline" href="/admin/menu.html#professores">Voltar ao Menu Admin</a>
      <section class="mt-5 rounded-lg bg-white p-6 shadow-sm">
        <h1 class="text-2xl font-bold text-slate-950">Excluir professor</h1>
        <p class="mt-1 text-sm text-slate-600">Pesquise pelas letras iniciais e exclua o professor selecionado.</p>
        <p id="message" class="mt-5 hidden"></p>
        <p id="empty-state" class="mt-5 hidden rounded-md border border-dashed border-slate-300 p-4 text-center text-sm text-slate-500">Nenhum professor cadastrado.</p>

        <div class="mt-6">
          <label class="mb-2 block text-sm font-bold text-slate-700" for="professor-id">Professor</label>
          <input id="professor-id" type="hidden" />
          <input class="h-12 w-full rounded-md border border-slate-300 px-3 outline-none focus:border-orange-600 focus:ring-4 focus:ring-orange-600/15" id="professor-search" autocomplete="off" placeholder="Digite as letras iniciais do professor" />
          <div id="professor-results" class="mt-2 hidden overflow-hidden rounded-md border border-slate-200 bg-white"></div>
          <div id="professor-selected" class="mt-4 hidden rounded-md bg-slate-100 p-4 text-sm text-slate-700"></div>
          <button id="delete-professor-button" class="mt-4 h-12 rounded-md bg-red-600 px-4 text-sm font-bold text-white hover:bg-red-700" type="button" disabled>
            Excluir professor selecionado
          </button>
        </div>
      </section>
    </main>
    <script type="module" src="/src/professores.js"></script>
  </body>
</html>
